server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Resolucion dinamica de DNS para que nginx no falle si backend aun no esta listo
    resolver 127.0.0.11 valid=10s;

    # Redirige rutas de Angular al index (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hace proxy de las llamadas a la API hacia el backend
    location /bss/ {
        set $backend http://backend:5000;
        proxy_pass $backend/bss/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
