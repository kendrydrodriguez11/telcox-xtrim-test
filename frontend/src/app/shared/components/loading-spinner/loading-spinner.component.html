<div class="spinner-wrapper fade-in">
  <div class="spinner-ring">
    <svg viewBox="0 0 50 50" class="spinner-svg">
      <circle cx="25" cy="25" r="20" fill="none" stroke-width="3" class="spinner-track" />
      <circle cx="25" cy="25" r="20" fill="none" stroke-width="3" class="spinner-arc" />
    </svg>
  </div>
  <p class="spinner-message">{{ message }}</p>
</div>
